<mat-card class="hotel-card">
  <img [src]="hotel.photoUrl || 'https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1200&auto=format&fit=crop'" [alt]="hotel.name" />
  <mat-card-content>
    <h3>{{ hotel.name }}</h3>
    <p>{{ hotel.city }}, {{ hotel.country }}</p>
    <p class="description">{{ hotel.description }}</p>
    <app-star-rating [rating]="hotel.starRating"></app-star-rating>
    <p class="price">From {{ hotel.lowestPricePerNight ?? hotel.roomTypes?.[0]?.pricePerNight ?? 0 | currency : 'INR' : 'symbol' : '1.0-0' }}</p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-flat-button color="primary" (click)="onView()">View Hotel</button>
  </mat-card-actions>
</mat-card>
